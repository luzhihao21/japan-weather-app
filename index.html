<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本天气 & 智能地图</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react-leaflet/lib/index.js"></script>

    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        button { padding: 10px 20px; background: #5c6bc0; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #map { height: 250px; width: 100%; border-radius: 15px; margin-top: 20px; border: 1px solid #eee; }
        .advice { background: #fff9c4; padding: 15px; border-radius: 12px; margin-top: 15px; text-align: left; border-left: 5px solid #fbc02d; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // 关键补丁：从全局获取地图组件
        const { MapContainer, TileLayer, Marker, useMap } = window.ReactLeaflet;

        // 让地图跟着城市跑的小组件
        function RecenterMap({ coords }) {
            const map = useMap();
            useEffect(() => { map.setView(coords, 10); }, [coords]);
            return null;
        }

        function App() {
            const [city, setCity] = useState('Tokyo');
            const [weather, setWeather] = useState(null);
            const [pos, setPos] = useState([35.6895, 139.6917]); // 默认东京坐标
            const API_KEY = '849b380f2d4f8f4118f77103e5c949d2'; // 请确认这是你发回来的那个有效Key

            const search = async (name) => {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${name}&appid=${API_KEY}&units=metric&lang=ja`);
                const data = await res.json();
                if(data.cod === 200) {
                    setWeather(data);
                    setPos([data.coord.lat, data.coord.lon]);
                }
            };

            useEffect(() => { search('Tokyo'); }, []);

            return (
                <div className="app-card">
                    <h2>🇯🇵 日本天气 & 穿衣地图</h2>
                    <div className="search-row">
                        <input value={city} onChange={e => setCity(e.target.value)} placeholder="Enter city (e.g. Osaka)" />
                        <button onClick={() => search(city)}>検索</button>
                    </div>

                    {weather && (
                        <div>
                            <h3>{weather.name} · {weather.main.temp}°C</h3>
                            <p>{weather.weather[0].description}</p>
                            
                            <div className="advice">
                                <strong>💡 服装建议：</strong>
                                <p>{weather.main.temp > 20 ? "穿件衬衫就行 👕" : "得穿外套了 🧥"}</p>
                            </div>

                            {/* 地图组件 */}
                            <div id="map">
                                <MapContainer center={pos} zoom={10} style={{height: '100%', width: '100%', borderRadius: '15px'}}>
                                    <TileLayer url="https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" />
                                    <Marker position={pos} />
                                    <RecenterMap coords={pos} />
                                </MapContainer>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
