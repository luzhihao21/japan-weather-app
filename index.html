<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气ナビ - Weather Navi</title>

    <link rel="stylesheet" href="./App.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react-leaflet/lib/index.js"></script>

    <script>
        window.onload = function() {
            if (window.ReactLeaflet) {
                window.MapContainer = window.ReactLeaflet.MapContainer;
                window.TileLayer = window.ReactLeaflet.TileLayer;
                window.Marker = window.ReactLeaflet.Marker;
                window.Popup = window.ReactLeaflet.Popup;
                window.useMap = window.ReactLeaflet.useMap;
            }
        };
    </script>
    
    <style>
        /* 确保地图容器有高度，否则会看不见 */
        .leaflet-container {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="./App.jsx"></script>
</body>
</html>
